# Pinned Lima release — shipped inside the clawenv bundle.
#
# Bumping the version here is all that's needed; no Rust code change required.
# Steps to upgrade:
#   1. Browse https://github.com/lima-vm/lima/releases for the new version.
#   2. Download SHA256SUMS from that release, copy the Darwin-arm64 and
#      Darwin-x86_64 checksums into this file.
#   3. Update `version` to the new tag (without the leading "v").
#   4. Rebuild clawgui so the new values are embedded.
#
# The loader verifies the downloaded tarball against these checksums before
# extraction — a mismatch aborts the install.
version = "2.1.1"

# Download URL templates, tried in order until one succeeds AND checksum matches.
# Placeholders:
#   {version}  — the `version` field above (e.g. "2.1.1")
#   {filename} — the release asset filename (e.g. "lima-2.1.1-Darwin-arm64.tar.gz")
#
# The first entry is the canonical GitHub URL. The remaining entries are
# community mirror proxies useful in regions where GitHub is blocked or slow.
# Mirror hosts may come and go — edit this list freely without touching code.
#
# NOTE: must appear before any [table] header — TOML groups subsequent keys
# under the last declared table, so moving this below [sha256] would bind it
# as sha256.urls instead of a top-level key.
urls = [
    "https://github.com/lima-vm/lima/releases/download/v{version}/{filename}",
    "https://ghproxy.net/https://github.com/lima-vm/lima/releases/download/v{version}/{filename}",
    "https://hub.gitmirror.com/https://github.com/lima-vm/lima/releases/download/v{version}/{filename}",
    "https://gh.llkk.cc/https://github.com/lima-vm/lima/releases/download/v{version}/{filename}",
]

[sha256]
darwin-arm64  = "b6b0e6701189cd8c4e549cc39e6d054dc681487798b9b774ad2cbd30c08b2bd8"
darwin-x86_64 = "2dc5b10aa3a4f26d08c1f3fe83e37e01f85a7d9db0d1d5cb6985b18af96ab07d"
