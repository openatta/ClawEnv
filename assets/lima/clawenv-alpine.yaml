# ClawEnv Lima Template — Alpine Linux
# cgroup v2 unified mode fix included (alpine-lima issue #1878)
# {ARCH} is replaced at runtime with "aarch64" or "x86_64"

vmType: vz
os: Linux
arch: "{ARCH}"

images:
  - location: "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/{ARCH}/alpine-virt-3.21.3-{ARCH}.iso"
    arch: "{ARCH}"

cpus: 2
memory: "512MiB"
disk: "8GiB"

mounts:
  - location: "~/.clawenv/workspaces/{INSTANCE_NAME}"
    writable: true
    mountPoint: "/workspace"
  - location: "~"
    writable: false
    mountPoint: "/host-home"

hostResolver:
  enabled: true

provision:
  - mode: system
    script: |
      #!/bin/ash
      set -e

      # Fix: cgroup v2 unified mode
      if [ -f /etc/conf.d/cgroups ]; then
        sed -i 's/rc_cgroup_mode=.*/rc_cgroup_mode=unified/' /etc/conf.d/cgroups
        rc-update add cgroups boot 2>/dev/null || true
      fi

      # Install runtime dependencies
      apk update
      apk add --no-cache nodejs npm git curl bash ca-certificates

      # Install OpenClaw
      npm install -g openclaw@{OPENCLAW_VERSION}

      openclaw --version
      echo "ClawEnv Alpine VM initialized"
