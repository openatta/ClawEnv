# ClawEnv Lima Template — Alpine Linux
# Provision installs system packages only (fast, ~30s).
# OpenClaw npm install is done post-boot by the installer.

minimumLimaVersion: "2.0.0"

user:
  name: "clawenv"

images:
- location: "https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.2-x86_64-uefi-cloudinit-r0.qcow2"
  arch: "x86_64"
  digest: "sha512:26e10874cda1c8a63b00744b5497e74764dcadf3213fb85a6cb7e7bf06a0b9d9b1e6aae166ecb009794b7b6ccfc069d16301a7b7e10f0a5dd1860b918fdd1eb9"
- location: "https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.2-aarch64-uefi-cloudinit-r0.qcow2"
  arch: "aarch64"
  digest: "sha512:f4086df9ee84a08e4e5a9fef16d810b459d42fb6b9d7cb4690250f3d2d4290c57b8e2610103b91ac953ee2da87308771b73249f1d72e4c614045e7c2fb96043d"

mounts:
- location: "~"
- location: "{WORKSPACE_DIR}"
  writable: true
  mountPoint: "/workspace"

containerd:
  system: false
  user: false

# Port forwarding: expose guest services to host localhost via Lima SSH tunnel.
# This is the reliable way for host (xterm.js, browser) to reach guest services.
portForwards:
- guestPort: {GATEWAY_PORT}
  hostPort: {GATEWAY_PORT}
- guestPort: {TTYD_PORT}
  hostPort: {TTYD_PORT}
- guestPort: {BRIDGE_PORT}
  hostPort: {BRIDGE_PORT}
- guestPort: {CDP_PORT}
  hostPort: {CDP_PORT}
- guestPort: {VNC_WS_PORT}
  hostPort: {VNC_WS_PORT}
- guestPort: {DASHBOARD_PORT}
  hostPort: {DASHBOARD_PORT}

provision:
- mode: system
  script: |
    #!/bin/sh
    {PROXY_SCRIPT}

    # One try-cycle per Alpine mirror: set repos, apk update, apk add.
    # Individual commands get hard timeouts so a slow/flaky mirror (dl-cdn
    # Fastly 5xx, a single hung package download, proxy stalls) can never
    # freeze the whole provision step — we just move to the next mirror.
    # `set -e` is intentionally *not* enabled: the fallback chain depends on
    # failures being caught via `&&` short-circuiting, not aborting the script.
    PACKAGES="git curl bash nodejs npm ttyd openssh build-base python3 procps"

    try_install() {
      m="$1"
      ALPINE_VER=$(cat /etc/alpine-release 2>/dev/null | cut -d. -f1,2)
      echo "[provision] trying $m"
      echo "$m/v$ALPINE_VER/main" > /etc/apk/repositories
      echo "$m/v$ALPINE_VER/community" >> /etc/apk/repositories
      timeout 60  apk update              2>>/tmp/apk.err && \
      timeout 600 apk add --no-cache $PACKAGES 2>>/tmp/apk.err
    }

    SUCCESS=""
    USER_MIRROR="{USER_ALPINE_MIRROR}"
    [ -n "$USER_MIRROR" ] && try_install "$USER_MIRROR" && SUCCESS=1
    [ -z "$SUCCESS" ] && try_install "https://dl-cdn.alpinelinux.org/alpine" && SUCCESS=1
    [ -z "$SUCCESS" ] && try_install "https://mirrors.tuna.tsinghua.edu.cn/alpine" && SUCCESS=1
    [ -z "$SUCCESS" ] && try_install "https://mirrors.aliyun.com/alpine" && SUCCESS=1
    [ -z "$SUCCESS" ] && try_install "https://mirror.sjtu.edu.cn/alpine" && SUCCESS=1
    if [ -z "$SUCCESS" ]; then
      echo "ERROR: no Alpine mirror could complete update + add" >&2
      tail -60 /tmp/apk.err >&2 2>/dev/null || true
      exit 1
    fi

    ssh-keygen -A
    # Allow clawenv user to npm install -g without sudo
    mkdir -p /usr/local/lib/node_modules /usr/local/bin
    chown -R clawenv:clawenv /usr/local/lib/node_modules /usr/local/bin
