# ClawEnv — Built-in Claw Product Registry
#
# Products that ClawEnv can independently install and manage inside a sandbox.
# Supports npm-based (OpenClaw, NanoClaw) and pip-based (Hermes Agent) products.
#
# Products NOT listed here (documented in docs/13-claw-registry.md):
#   - OpenClaw wrappers distributed as desktop installers (AutoClaw, QClaw, EasyClaw)
#   - Cloud SaaS only (ArkClaw, DuClaw, Kimi Claw)
#   - npm packages without CLI binary (zeroclaw SDK)
#
# To add a new claw:
#   npm: verify `npm view <package> bin` returns a CLI binary
#   pip: verify `pip install <package> && <binary> --version` works on Alpine
# Then run `bash scripts/test-claw-lifecycle.sh <id>` to validate.

[[claw]]
id = "openclaw"
display_name = "OpenClaw"
logo = "🦞"
package_manager = "npm"
npm_package = "openclaw"
cli_binary = "openclaw"
gateway_cmd = "gateway --port {port} --allow-unconfigured"
version_cmd = "--version"
config_apikey_cmd = "config set apiKey '{key}'"
mcp_set_cmd = "mcp set {name} '{json}'"
default_port = 3000
supports_mcp = true
supports_browser = true
has_gateway_ui = true
supports_native = true
mcp_runtime = "node"

# NanoClaw — security-focused OpenClaw alternative (Docker container isolation)
# npm install from git clone, CLI binary confirmed
[[claw]]
id = "nanoclaw"
display_name = "NanoClaw"
logo = "🔒"
package_manager = "npm"
npm_package = "nanoclaw"
cli_binary = "nanoclaw"
gateway_cmd = "start --port {port}"
version_cmd = "--version"
config_apikey_cmd = "config set apiKey '{key}'"
mcp_set_cmd = ""
default_port = 3000
supports_mcp = false
supports_browser = false
has_gateway_ui = true
supports_native = true
mcp_runtime = "node"

# Hermes Agent — self-improving AI agent by Nous Research
# Python-based, git clone + uv install, sandbox-only (no native install)
[[claw]]
id = "hermes"
display_name = "Hermes Agent"
logo = "☤"
package_manager = "git_pip"
git_repo = "https://github.com/NousResearch/hermes-agent.git"
# "all" extras contain voice→ctranslate2 which requires glibc (no musl/Alpine wheels).
# Use termux extras (designed for non-glibc) + messaging + web as Alpine-safe baseline.
pip_extras = "termux,messaging,web"
pip_package = "hermes-agent"
sandbox_provision = ["py3-pip", "py3-uv", "nodejs", "npm"]
cli_binary = "hermes"
gateway_cmd = ""
version_cmd = "--version"
config_apikey_cmd = "config set api_key '{key}'"
mcp_set_cmd = "mcp add {name} --config '{json}'"
default_port = 3000
supports_mcp = true
supports_browser = false
has_gateway_ui = false
supports_native = false
mcp_runtime = "python"
