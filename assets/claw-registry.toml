# ClawEnv — Built-in Claw Product Registry
#
# Products that ClawEnv can independently install and manage inside a sandbox.
# Supports npm-based (OpenClaw) and pip-based (Hermes Agent) products.
#
# Products NOT listed here (documented in docs/13-claw-registry.md):
#   - OpenClaw wrappers distributed as desktop installers (AutoClaw, QClaw, EasyClaw)
#   - Cloud SaaS only (ArkClaw, DuClaw, Kimi Claw)
#   - npm packages without CLI binary (zeroclaw SDK)
#
# To add a new claw:
#   npm: verify `npm view <package> bin` returns a CLI binary
#   pip: verify `pip install <package> && <binary> --version` works on Alpine
# Then run `bash scripts/test-claw-lifecycle.sh <id>` to validate.

[[claw]]
id = "openclaw"
display_name = "OpenClaw"
logo = "🦞"
package_manager = "npm"
npm_package = "openclaw"
cli_binary = "openclaw"
gateway_cmd = "gateway --port {port} --allow-unconfigured"
version_cmd = "--version"
# Post-install, pre-first-gateway-start seed for OpenClaw's config
# file. Without gateway.mode set, `openclaw gateway` bails with
# "existing config is missing gateway.mode" even under
# --allow-unconfigured. Setting it via `config set` once is sufficient;
# OC persists the value in openclaw.json.
config_init_cmd = "config set gateway.mode local"
mcp_set_cmd = "mcp set {name} '{json}'"
default_port = 3000
supports_mcp = true
supports_browser = true
has_gateway_ui = true
supports_native = true
mcp_runtime = "node"

# Hermes Agent — self-improving AI agent by Nous Research
# Python-based, git clone + uv install, sandbox-only (no native install)
#
# Hermes splits UI and API across two processes (different from OpenClaw):
#   - `hermes dashboard`    web management UI (React app bundled under /opt/hermes/web)
#   - `hermes gateway run`  messaging bridge (Telegram / Discord / WhatsApp) — requires
#                           user to configure a bot token first, so we do NOT auto-start
#                           it (would just loop-fail in nohup). Users start it manually
#                           after setup. `gateway_cmd` therefore stays empty.
#
# The dashboard ships its Web UI as source (/opt/hermes/web/*) and auto-builds it on
# first launch via `npm install && npm run build`. Our install flow pre-builds it so
# the user's first click doesn't stall for 3+ minutes — see core/src/manager/install.rs
# Hermes-specific section.
#
# API_SERVER_ENABLED=true in ~/.hermes/.env enables the OpenAI-compatible API Server
# which is hosted by the `hermes dashboard` process (same port as the UI) — no
# separate daemon needed.
#
# Known issue: [web] extra has uv.lock bug (NousResearch/hermes-agent#9569),
# fastapi/uvicorn installed explicitly as workaround.
[[claw]]
id = "hermes"
display_name = "Hermes Agent"
logo = "☤"
package_manager = "git_pip"
git_repo = "https://github.com/NousResearch/hermes-agent.git"
# "all" extras contain voice→ctranslate2 which requires glibc (no musl/Alpine wheels).
# Use termux extras (designed for non-glibc) + messaging + web as Alpine-safe baseline.
pip_extras = "termux,messaging,web"
pip_package = "hermes-agent"
sandbox_provision = ["py3-pip", "py3-uv", "nodejs", "npm"]
cli_binary = "hermes"
gateway_cmd = ""                                              # no messaging auto-start
# --host 127.0.0.1 (not 0.0.0.0): Hermes refuses 0.0.0.0 without --insecure
# because the dashboard exposes API keys + config with weak auth. Lima,
# WSL2 and Podman all forward 127.0.0.1-bound guest ports to 127.0.0.1 on
# the host via their native tunnel, so loopback-only binding still works
# end-to-end for us without widening the exposure surface.
dashboard_cmd = "dashboard --port {port} --host 127.0.0.1 --no-open"
dashboard_port_offset = 5                                     # dashboard at gateway_port+5
version_cmd = "--version"
mcp_set_cmd = "mcp add {name} --config '{json}'"
default_port = 3000
supports_mcp = true
supports_browser = false
has_gateway_ui = true
supports_native = false
mcp_runtime = "python"
