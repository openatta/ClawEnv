# ClawEnv — Built-in Claw Product Registry
# Each [[claw]] entry defines how to install, run, and manage a claw variant.

[[claw]]
id = "openclaw"
display_name = "OpenClaw"
logo = "🦞"
npm_package = "openclaw"
cli_binary = "openclaw"
gateway_cmd = "gateway --port {port} --allow-unconfigured"
version_cmd = "--version"
config_apikey_cmd = "config set apiKey '{key}'"
mcp_set_cmd = "mcp set {name} '{json}'"
default_port = 3000
supports_mcp = true
supports_browser = true

