# ClawEnv v2 download catalog.
#
# Stage B: populated from v1's `assets/mirrors.toml` (the authoritative
# source in v1). URL templates from v1 are expanded into flat per-platform
# rows here — v2 treats each (name, version, os, arch) as a distinct
# catalog entry.
#
# Fields:
#   name       - identifier used by CLI: `clawops download fetch <name>`
#   version    - exact version; no semver ranges
#   os         - "macos" | "linux" | "windows"
#   arch       - "arm64" | "x86_64"
#   url        - full upstream URL (no mirrors; v1 contract: connectivity is
#                the user's problem, not ours)
#   sha256     - hex digest; omitted where upstream doesn't publish one
#                (node, mingit) — TLS + HTTP 200 is the safety net
#   kind       - "tarball" (.tar.gz/.tar.xz) | "zip" | "binary" | "rootfs"
#   size_hint  - bytes, informational
#
# Extraction format is inferred from the URL extension:
#   .tar.gz / .tgz  → gzip + tar
#   .tar.xz         → xz + tar
#   .zip            → zip

