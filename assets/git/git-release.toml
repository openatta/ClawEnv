# Pinned portable Git release — shipped inside the clawenv bundle.
#
# Source: desktop/dugite-native
# (https://github.com/desktop/dugite-native/releases). This is GitHub Desktop's
# actively-maintained portable git distribution — one tarball per platform,
# each containing a fully self-contained git + libexec/git-core + share/, so
# the extracted tree runs standalone without any system git or Xcode CLT.
#
# Bumping the version is all that's needed; no Rust code change required:
#   1. Browse https://github.com/desktop/dugite-native/releases for the new
#      tag (e.g. "v2.53.0-3").
#   2. For each platform listed in [sha256] below, download that platform's
#      `.tar.gz.sha256` file and copy the hex checksum here.
#   3. Update `version` and `commit` to match the new tag + short SHA (the
#      tag tells us the directory on GitHub; the commit is embedded in the
#      asset filename).
#   4. Rebuild clawgui so the new values are embedded.
#
# The loader verifies the downloaded tarball against these checksums before
# extraction — a mismatch aborts the install.

# The dugite-native release tag carries a build counter (`-3`) after the
# upstream git version, but the asset filenames embed only the upstream
# version. We have to render these into different template slots:
#
#   URL path:  https://.../download/v{tag}/{filename}
#   Filename:  dugite-native-v{upstream_version}-{commit}-{platform}.tar.gz
#
# Example for v2.53.0-3:
#   tag              = "2.53.0-3"
#   upstream_version = "2.53.0"
#   commit           = "f49d009"
#   → URL  = .../download/v2.53.0-3/dugite-native-v2.53.0-f49d009-macOS-arm64.tar.gz
tag              = "2.53.0-3"
upstream_version = "2.53.0"
commit           = "f49d009"

# URL templates tried in order. Placeholders:
#   {tag}              — dugite release tag (e.g. "2.53.0-3") — for URL path
#   {upstream_version} — upstream git version (e.g. "2.53.0") — for filename
#   {commit}           — short SHA from `commit` above
#   {platform}         — "macOS-arm64" | "macOS-x64" | "ubuntu-arm64" | "ubuntu-x64"
#   {filename}         — the full asset filename (already substituted)
#
# NOTE: must appear BEFORE any [table] header — TOML binds subsequent keys
# to the last declared table, so placing this below [sha256] would make it
# sha256.urls instead of a top-level key.
urls = [
    "https://github.com/desktop/dugite-native/releases/download/v{tag}/{filename}",
]

[sha256]
# dugite-native-v2.53.0-f49d009-<platform>.tar.gz
macos-arm64  = "e561cfc80c755e6f3e938653e81efcd025c9827a5b76dd42778b1159b3fab437"
macos-x86_64 = "caf27c36b8834969550535bcd5e58186f970e080d1e175e76d9c1de3aac409ed"
linux-arm64  = "d562ad433ed0dc1907f44a92fc701597bc577c48d07fe69ee7adddfee836ef4c"
linux-x86_64 = "b3a85433c8dfde76d21b90938ad2f971653deff4340b1b4d347258c63250eafc"
