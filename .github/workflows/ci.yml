name: CI

# Triggered intentionally sparsely to cut email noise:
#   - push to main   → run the light "test" matrix only (quick sanity)
#   - push of tag v* → run everything (pre-release gate)
#   - PR to main     → run "test" matrix (reviewers' signal)
#   - manual         → run everything on demand via workflow_dispatch
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# One-in-flight rule: a new push cancels any queued run for the same ref
# (the old one's results don't matter once HEAD moves). Saves CI minutes
# and stops "Run #N cancelled" emails from accumulating.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # L1: Unit tests + lint (fast, all platforms) — always runs
  # ============================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Version-drift guard: all four version strings (core/cli/tauri Cargo,
      # tauri.conf.json, package.json) must agree, otherwise released bundles
      # stamp the wrong clawenv_version in their manifest. Linux-only — the
      # check is pure text, doesn't need three OSes.
      - name: Version SSOT guard
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/check-version-sync.sh

      - name: Check (core + cli)
        run: cargo check -p clawenv-core -p clawcli

      - name: Test (core)
        run: cargo test -p clawenv-core

      - name: Test (cli e2e)
        run: cargo test -p clawcli

      # Clippy is a hard gate now — we shipped dead-code warnings for weeks
      # because this step had continue-on-error. No more silent drift.
      # `--tests` ensures test code isn't a loophole for warnings either.
      - name: Clippy
        run: cargo clippy -p clawenv-core -p clawcli --tests -- -D warnings

  # ============================================================
  # L2: CLI smoke — heavy matrix; only on tags / manual runs.
  # Skipped on normal pushes/PRs to keep email churn low.
  # ============================================================
  cli-smoke:
    name: CLI Smoke (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build -p clawcli

      # Binary extension differs by OS; resolve once then reuse. Using bash
      # for portability — it's the default shell on all three runners.
      - name: Resolve CLI path
        id: cli
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=./target/debug/clawcli.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=./target/debug/clawcli" >> "$GITHUB_OUTPUT"
          fi

      - name: CLI version
        shell: bash
        run: ${{ steps.cli.outputs.path }} --version

      - name: CLI doctor
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json doctor

      - name: CLI system-check
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json system-check

      - name: CLI claw-types
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json claw-types

      - name: CLI config show
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json config show || true

      # sandbox list probes the platform-native backend (Lima / Podman / WSL).
      # Hosted runners don't have any of them installed, so an empty/failure
      # result is expected — don't block the pipeline on it.
      - name: CLI sandbox list
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json sandbox list || true

      - name: CLI sandbox info
        shell: bash
        run: ${{ steps.cli.outputs.path }} --json sandbox info || true

      # Bundle manifest unit tests — file-format correctness, synthetic
      # payloads, serde drift guard. Fast (~0.05s).
      - name: Bundle manifest unit tests
        shell: bash
        run: cargo test -p clawenv-core --lib export:: sandbox::sandbox_type_tests

      # Bundle contract e2e — CLI import rejects manifest-less /
      # future-schema / wrong-backend bundles. No live instance required,
      # so CI can run it on all three OSes.
      - name: Bundle offline e2e
        shell: bash
        run: ./scripts/e2e-bundle-offline.sh

      # Podman wrap/unwrap roundtrip — Linux only. Installs podman and
      # runs a real `podman save → wrap → unwrap → podman load` cycle
      # against a 3MB alpine image. Catches wrap helper regressions
      # against actual container-image tar format (unit tests only use
      # synthetic bytes). Skipped if podman install fails on the runner.
      - name: Install podman (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman
          podman --version
      - name: Podman wrap roundtrip (Linux)
        if: runner.os == 'Linux'
        run: cargo test -p clawenv-core --test podman_roundtrip -- --ignored --nocapture

  # ============================================================
  # L3: Cross-compile Linux static binary — tags / manual only.
  # ============================================================
  cross-compile:
    name: Cross-compile (Linux aarch64)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl cross toolchain
        run: brew install filosottile/musl-cross/musl-cross

      - name: Cross-compile
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
        run: cargo build -p clawcli --target aarch64-unknown-linux-musl --release

      - name: Verify binary
        run: file target/aarch64-unknown-linux-musl/release/clawcli

  # ============================================================
  # Tauri GUI check — tags / manual only (expensive: webkit2gtk,
  # full Tauri build deps on three OSes).
  # ============================================================
  tauri-check:
    name: Tauri Check (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-

      - name: Check Tauri
        run: cargo check -p clawgui
